<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SimpCorp</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.12), transparent 35%),
        linear-gradient(180deg, #0b0b0c, #000000);
      color: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 40px;
      animation: fadeUp 1.2s ease forwards;
    }

    .brand {
      font-size: clamp(48px, 10vw, 120px);
      font-weight: 700;
      letter-spacing: -4px;
      line-height: 1;
      background: linear-gradient(180deg, #ffffff, #9b9b9f);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .message {
      margin-top: 22px;
      font-size: clamp(18px, 3vw, 28px);
      font-weight: 400;
      color: #a1a1a6;
      letter-spacing: -0.5px;
    }

    .pill {
      margin-top: 36px;
      display: inline-block;
      padding: 12px 24px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      color: #d2d2d7;
      font-size: 14px;
      backdrop-filter: blur(18px);
      background: rgba(255,255,255,0.04);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .glow {
      position: absolute;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      filter: blur(90px);
      z-index: -1;
    }

    .glow.one {
      top: -120px;
      left: -100px;
    }

    .glow.two {
      bottom: -140px;
      right: -120px;
    }
  </style>
</head>

<body>
  <div class="glow one"></div>
  <div class="glow two"></div>

  <main class="container">
    <h1 class="brand">simpcorp</h1>
    <p class="message">site is under maintenance.</p>
    <div class="pill">coming soon</div>
  </main>
</body>
</html>
