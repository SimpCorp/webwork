<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SimpCorp</title>
  <link rel="icon" type="image/png" href="logoicon.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #000;
      color: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      overflow: hidden;
    }

    .loader {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      animation: hideLoader 1s ease forwards;
      animation-delay: 4s;
    }

    .loader-text {
      font-size: 18px;
      letter-spacing: 8px;
      text-transform: lowercase;
      color: #f5f5f7;
      animation: pulseText 1.4s ease-in-out infinite;
    }

    @keyframes hideLoader {
      to {
        opacity: 0;
        visibility: hidden;
      }
    }

    @keyframes pulseText {
      0%, 100% {
        opacity: 0.25;
        transform: scale(0.98);
      }
      50% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 24px;
      opacity: 0;
      animation: revealPage 1.2s ease forwards;
      animation-delay: 4.2s;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.13), transparent 25%),
        radial-gradient(circle at 80% 80%, rgba(120,120,120,0.16), transparent 30%),
        linear-gradient(180deg, #090909, #000);
    }

    @keyframes revealPage {
      to {
        opacity: 1;
      }
    }

    .noise {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle, black, transparent 75%);
      pointer-events: none;
    }

    .orb {
      position: absolute;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
      filter: blur(80px);
      animation: floatOrb 8s ease-in-out infinite alternate;
    }

    .orb.one {
      top: -120px;
      left: -100px;
    }

    .orb.two {
      bottom: -130px;
      right: -100px;
      animation-delay: 1.5s;
    }

    @keyframes floatOrb {
      from {
        transform: translate(0, 0);
      }
      to {
        transform: translate(35px, -25px);
      }
    }

    .card {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 56px 42px;
      max-width: 720px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 34px;
      background: rgba(255,255,255,0.045);
      backdrop-filter: blur(28px);
      box-shadow: 0 30px 90px rgba(0,0,0,0.55);
      animation: cardEnter 1.1s ease forwards;
      animation-delay: 4.4s;
      transform: translateY(18px);
      opacity: 0;
    }

    @keyframes cardEnter {
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .brand {
      font-size: clamp(54px, 12vw, 126px);
      font-weight: 700;
      letter-spacing: -5px;
      line-height: 0.95;
      background: linear-gradient(180deg, #ffffff, #8f8f93);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .message {
      margin-top: 24px;
      color: #a1a1a6;
      font-size: clamp(18px, 3vw, 28px);
      letter-spacing: -0.6px;
    }

    .status {
      margin: 34px auto 0;
      width: fit-content;
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      color: #d2d2d7;
      background: rgba(255,255,255,0.05);
      font-size: 13px;
      letter-spacing: 0.4px;
      animation: softGlow 2.6s ease-in-out infinite;
    }

    @keyframes softGlow {
      0%, 100% {
        box-shadow: 0 0 0 rgba(255,255,255,0);
      }
      50% {
        box-shadow: 0 0 28px rgba(255,255,255,0.12);
      }
    }

    .contact-wrap {
      position: fixed;
      right: 28px;
      bottom: 28px;
      z-index: 10;
      opacity: 0;
      animation: revealContact 1s ease forwards;
      animation-delay: 4.8s;
    }

    @keyframes revealContact {
      to {
        opacity: 1;
      }
    }

    .contact-btn {
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      color: #f5f5f7;
      padding: 13px 22px;
      border-radius: 999px;
      cursor: pointer;
      backdrop-filter: blur(18px);
      font-size: 14px;
      transition: 0.35s ease;
    }

    .contact-btn:hover {
      background: rgba(255,255,255,0.16);
      transform: translateY(-3px);
    }

    .mail-box {
      position: absolute;
      right: 0;
      bottom: 58px;
      padding: 14px 18px;
      border-radius: 18px;
      background: rgba(20,20,22,0.82);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(20px);
      color: #f5f5f7;
      font-size: 14px;
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: 0.35s ease;
      white-space: nowrap;
    }

    .mail-box.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .mail-box a {
      color: #f5f5f7;
      text-decoration: none;
    }

    .mail-box a:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .card {
        padding: 44px 26px;
        border-radius: 28px;
      }

      .brand {
        letter-spacing: -3px;
      }

      .contact-wrap {
        right: 18px;
        bottom: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="loader">
    <div class="loader-text">simpcorp</div>
  </div>

  <section class="page">
    <div class="noise"></div>
    <div class="orb one"></div>
    <div class="orb two"></div>

    <main class="card">
      <h1 class="brand">simpcorp</h1>
      <p class="message">site is under maintenance.</p>
      <div class="status">quietly rebuilding</div>
    </main>

    <div class="contact-wrap">
      <div class="mail-box" id="mailBox">
        <a href="mailto:simpcorp@icloud.com">simpcorp@icloud.com</a>
      </div>

      <button class="contact-btn" onclick="toggleMail()">Contact</button>
    </div>
  </section>

  <script>
    function toggleMail() {
      var mailBox = document.getElementById("mailBox");
      mailBox.classList.toggle("show");
    }
  </script>
</body>
</html>
