<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta 
    name="viewport" 
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" 
  />

  <meta name="theme-color" content="#000000" />
  <meta name="description" content="SimpCorp site is under maintenance." />

  <title>SimpCorp</title>
  <link rel="icon" type="image/png" href="favicon.png" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      background: #000;
      color: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      overflow-x: hidden;
      overflow-y: hidden;
      touch-action: manipulation;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    button {
      font-family: inherit;
      font-size: 16px;
    }

    .loader {
      position: fixed;
      inset: 0;
      min-height: 100vh;
      min-height: 100dvh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      animation: hideLoader 0.9s ease forwards;
      animation-delay: 3.8s;
    }

    .loader-mark {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle, rgba(255,255,255,0.12), rgba(255,255,255,0.02));
      backdrop-filter: blur(20px);
      animation: loaderPulse 1.5s ease-in-out infinite;
    }

    .loader-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f5f5f7;
      box-shadow: 0 0 22px rgba(255,255,255,0.8);
    }

    @keyframes hideLoader {
      to {
        opacity: 0;
        visibility: hidden;
      }
    }

    @keyframes loaderPulse {
      0%, 100% {
        transform: scale(0.96);
        opacity: 0.5;
      }

      50% {
        transform: scale(1.04);
        opacity: 1;
      }
    }

    .page {
      min-height: 100vh;
      min-height: 100dvh;
      width: 100%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 18%, rgba(255,255,255,0.14), transparent 25%),
        radial-gradient(circle at 80% 82%, rgba(255,255,255,0.10), transparent 28%),
        linear-gradient(180deg, #090909, #000000);
      opacity: 0;
      animation: revealPage 1s ease forwards;
      animation-delay: 3.95s;
    }

    @keyframes revealPage {
      to {
        opacity: 1;
      }
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle, black 0%, transparent 72%);
      pointer-events: none;
    }

    .grain {
      position: absolute;
      inset: 0;
      opacity: 0.12;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.07) 0 1px, transparent 1px),
        radial-gradient(circle at 80% 70%, rgba(255,255,255,0.05) 0 1px, transparent 1px);
      background-size: 28px 28px;
    }

    .orb {
      position: absolute;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
      filter: blur(82px);
      animation: floatOrb 8s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .orb.one {
      top: -120px;
      left: -100px;
    }

    .orb.two {
      right: -120px;
      bottom: -130px;
      animation-delay: 1.4s;
    }

    @keyframes floatOrb {
      from {
        transform: translate3d(0, 0, 0);
      }

      to {
        transform: translate3d(32px, -24px, 0);
      }
    }

    .card {
      position: relative;
      z-index: 2;
      width: min(100%, 760px);
      padding: 58px 42px;
      text-align: center;
      border-radius: 34px;
      border: 1px solid rgba(255,255,255,0.13);
      background: rgba(255,255,255,0.045);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      box-shadow:
        0 30px 90px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(255,255,255,0.08);
      opacity: 0;
      transform: translateY(18px) scale(0.985);
      animation: cardEnter 1s ease forwards;
      animation-delay: 4.15s;
    }

    @keyframes cardEnter {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .mini-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
      padding: 9px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      color: #c7c7cc;
      background: rgba(255,255,255,0.045);
      font-size: 13px;
      letter-spacing: 0.3px;
    }

    .mini-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #f5f5f7;
      box-shadow: 0 0 14px rgba(255,255,255,0.7);
      animation: blinkDot 2s ease-in-out infinite;
    }

    @keyframes blinkDot {
      0%, 100% {
        opacity: 0.35;
      }

      50% {
        opacity: 1;
      }
    }

    .brand {
      font-size: clamp(54px, 12vw, 126px);
      font-weight: 700;
      line-height: 0.95;
      letter-spacing: -5px;
      background: linear-gradient(180deg, #ffffff, #8f8f93);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .message {
      margin-top: 24px;
      color: #a1a1a6;
      font-size: clamp(18px, 3vw, 28px);
      line-height: 1.35;
      letter-spacing: -0.6px;
    }

    .subtext {
      max-width: 480px;
      margin: 18px auto 0;
      color: #74747a;
      font-size: 15px;
      line-height: 1.7;
    }

    .status {
      margin: 34px auto 0;
      width: fit-content;
      padding: 11px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      color: #d2d2d7;
      background: rgba(255,255,255,0.05);
      font-size: 13px;
      letter-spacing: 0.4px;
      animation: softGlow 2.6s ease-in-out infinite;
    }

    @keyframes softGlow {
      0%, 100% {
        box-shadow: 0 0 0 rgba(255,255,255,0);
      }

      50% {
        box-shadow: 0 0 28px rgba(255,255,255,0.13);
      }
    }

    .contact-wrap {
      position: fixed;
      right: 28px;
      bottom: calc(28px + env(safe-area-inset-bottom));
      z-index: 10;
      opacity: 0;
      animation: revealContact 0.9s ease forwards;
      animation-delay: 4.45s;
    }

    @keyframes revealContact {
      to {
        opacity: 1;
      }
    }

    .contact-btn {
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      color: #f5f5f7;
      min-width: 132px;
      padding: 14px 22px;
      border-radius: 999px;
      cursor: pointer;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      transition: transform 0.28s ease, background 0.28s ease, border-color 0.28s ease;
    }

    .contact-btn:hover {
      background: rgba(255,255,255,0.16);
      border-color: rgba(255,255,255,0.28);
      transform: translateY(-3px);
    }

    .contact-btn:active {
      transform: scale(0.96);
    }

    .mail-box {
      position: absolute;
      right: 0;
      bottom: 62px;
      padding: 14px 18px;
      border-radius: 18px;
      background: rgba(20,20,22,0.86);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.45);
      color: #f5f5f7;
      font-size: 14px;
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: opacity 0.32s ease, transform 0.32s ease;
      white-space: nowrap;
    }

    .mail-box.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .mail-box a {
      color: #f5f5f7;
      text-decoration: none;
    }

    .mail-box a:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .page {
        padding: 18px;
        align-items: center;
      }

      .card {
        width: min(100%, 360px);
        padding: 36px 22px;
        border-radius: 26px;
        backdrop-filter: blur(22px);
        -webkit-backdrop-filter: blur(22px);
      }

      .mini-label {
        margin-bottom: 20px;
        font-size: 12px;
        padding: 8px 12px;
      }

      .brand {
        font-size: clamp(48px, 17vw, 76px);
        letter-spacing: -2px;
      }

      .message {
        margin-top: 18px;
        font-size: 17px;
        line-height: 1.45;
      }

      .subtext {
        margin-top: 14px;
        font-size: 13px;
        line-height: 1.65;
      }

      .status {
        margin-top: 26px;
        font-size: 12px;
        padding: 10px 15px;
      }

      .contact-wrap {
        left: 50%;
        right: auto;
        bottom: calc(20px + env(safe-area-inset-bottom));
        transform: translateX(-50%);
      }

      .contact-btn {
        width: 140px;
        padding: 14px 18px;
        font-size: 16px;
      }

      .mail-box {
        left: 50%;
        right: auto;
        bottom: 62px;
        transform: translateX(-50%) translateY(10px);
        font-size: 13px;
        max-width: 88vw;
      }

      .mail-box.show {
        transform: translateX(-50%) translateY(0);
      }

      .orb {
        width: 230px;
        height: 230px;
        filter: blur(70px);
      }

      .grid {
        background-size: 34px 34px;
      }
    }

    @media (max-width: 380px) {
      .card {
        padding: 32px 18px;
      }

      .brand {
        font-size: 48px;
      }

      .message {
        font-size: 16px;
      }

      .subtext {
        font-size: 12.5px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
        scroll-behavior: auto !important;
      }

      .loader {
        display: none;
      }

      .page,
      .card,
      .contact-wrap {
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>

<body>
  <div class="loader">
    <div class="loader-mark">
      <div class="loader-dot"></div>
    </div>
  </div>

  <section class="page">
    <div class="grid"></div>
    <div class="grain"></div>
    <div class="orb one"></div>
    <div class="orb two"></div>

    <main class="card">
      <div class="mini-label">
        <span class="mini-dot"></span>
        rebuilding quietly
      </div>

      <h1 class="brand">simpcorp</h1>

      <p class="message">site is under maintenance.</p>

      <p class="subtext">
        A cleaner digital space is being shaped in silence.
      </p>

      <div class="status">coming soon</div>
    </main>

    <div class="contact-wrap">
      <div class="mail-box" id="mailBox">
        <a href="mailto:simpcorp@icloud.com">simpcorp@icloud.com</a>
      </div>

      <button class="contact-btn" onclick="toggleMail()">Contact</button>
    </div>
  </section>

  <script>
    function toggleMail() {
      var mailBox = document.getElementById("mailBox");
      mailBox.classList.toggle("show");
    }

    document.addEventListener("click", function(event) {
      var contactWrap = document.querySelector(".contact-wrap");
      var mailBox = document.getElementById("mailBox");

      if (!contactWrap.contains(event.target)) {
        mailBox.classList.remove("show");
      }
    });
  </script>
</body>
</html>
